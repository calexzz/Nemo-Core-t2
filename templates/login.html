<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — График сотрудников</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 360px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #4472C4; }
        button {
            width: 100%;
            padding: 11px;
            background: #4472C4;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #3560b0; }
        .error {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6cb;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .hint {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 5px;
            font-size: 12px;
            color: #555;
            border: 1px solid #e0e4f0;
        }
        .hint b { color: #333; }
        .hint div { margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📅 График сотрудников</h1>
        <div class="subtitle">Система планирования рабочих смен</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required placeholder="Введите логин">

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required placeholder="Введите пароль">

            <button type="submit">Войти</button>
        </form>

        <div class="hint">
            <b>Тестовые аккаунты:</b><br>
            <div>👑 Админ: <code>admin</code> / <code>admin123</code></div>
            <div>👔 Менеджер: <code>manager1</code> / <code>pass123</code></div>
            <div>👤 Сотрудник: <code>siz_alex</code> / <code>pass123</code></div>
        </div>
    </div>
</body>
</html>
